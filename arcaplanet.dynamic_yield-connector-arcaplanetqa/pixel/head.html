<script>
  ;(function () {
    // Il pixel e responsabile solo del caricamento degli script Dynamic Yield.
    // Il page context viene preparato dal componente React della TYP, perche solo li
    // abbiamo accesso ai dati dell'ordine e agli SKU acquistati.
    var sectionId = ''
    var sectionIdReady = false
    var contextReady = Boolean(window.__arcaDynamicYieldContextReady)
    var settingsPath = '/_v/arc/dynamic-yield/connector/pixel/settings'
    var cdnHost = 'cdn-eu.dynamicyield.com'
    var contextReadyEventName = 'arca:dy-context-ready'
    var fallbackTimeout = 5000
    var hosts = [
      cdnHost,
      'st-eu.dynamicyield.com',
      'rcom-eu.dynamicyield.com',
    ]

    function addPreconnect(host) {
      // Replica i preconnect suggeriti dallo snippet Dynamic Yield per ridurre la latenza.
      var href = '//' + host
      var existing = document.querySelector(
        'link[rel="preconnect"][href="' + href + '"]'
      )

      if (existing) {
        return
      }

      var link = document.createElement('link')
      link.rel = 'preconnect'
      link.href = href
      document.head.appendChild(link)
    }

    function loadScript(src, onload) {
      // Evita di caricare due volte lo stesso script se VTEX reinietta il pixel
      // o se il fallback e l'evento React arrivano quasi nello stesso momento.
      var existing = document.querySelector('script[src="' + src + '"]')

      if (existing) {
        if (onload) {
          onload()
        }

        return
      }

      var script = document.createElement('script')
      script.type = 'text/javascript'
      script.async = true
      script.defer = true
      script.src = src
      script.onload = onload || null

      var firstScript = document.getElementsByTagName('script')[0]
      firstScript.parentNode.insertBefore(script, firstScript)
    }

    function maybeLoadDynamicYieldScripts() {
      if (!sectionIdReady || !contextReady) {
        return
      }

      if (!sectionId) {
        console.warn('Dynamic Yield section ID is not configured')
        return
      }

      window.__arcaLoadDynamicYieldScripts()
    }

    function onContextReady() {
      contextReady = true
      maybeLoadDynamicYieldScripts()
    }

    function loadSettings() {
      if (!window.fetch) {
        sectionIdReady = true
        console.warn('Dynamic Yield settings request is not available')
        maybeLoadDynamicYieldScripts()
        return
      }

      window
        .fetch(settingsPath, {
          credentials: 'same-origin',
        })
        .then(function (response) {
          if (!response.ok) {
            throw new Error('Unable to load Dynamic Yield settings')
          }

          return response.json()
        })
        .then(function (settings) {
          sectionId = String(settings.dynamicYieldSectionId || '').trim()
          sectionIdReady = true
          maybeLoadDynamicYieldScripts()
        })
        .catch(function (error) {
          sectionIdReady = true
          console.warn(error.message)
          maybeLoadDynamicYieldScripts()
        })
    }

    if (window.__arcaDynamicYieldLoaded) {
      return
    }

    window.__arcaLoadDynamicYieldScripts = function () {
      if (window.__arcaDynamicYieldLoaded) {
        return
      }

      window.__arcaDynamicYieldLoaded = true

      // Dynamic Yield deve trovare window.DY.recommendationContext gia valorizzato
      // quando api_dynamic.js viene eseguito. Per questo il loader viene chiamato
      // dall'evento React, dopo che il context CART e stato scritto.
      loadScript(
        '//' + cdnHost + '/api/' + sectionId + '/api_dynamic.js',
        function () {
          loadScript('//' + cdnHost + '/api/' + sectionId + '/api_static.js')
        }
      )
    }

    window.DY = window.DY || {}

    // Se React ha gia preparato il context prima che questo pixel si registri,
    // carichiamo subito gli script. Normalmente pero il pixel arriva prima e resta
    // in ascolto dell'evento emesso dal componente DynamicYieldPurchase.
    if (window.__arcaDynamicYieldContextReady) {
      contextReady = true
      maybeLoadDynamicYieldScripts()
    } else {
      // Il pixel resta il proprietario del caricamento script, ma aspetta React:
      // React legge l'ordine, imposta recommendationContext e poi emette questo evento.
      window.addEventListener(
        contextReadyEventName,
        onContextReady
      )
    }

    // Fallback difensivo: se per qualche motivo il componente React non parte, dopo
    // alcuni secondi carichiamo comunque DY con un context generico per non bloccare
    // completamente lo script di base.
    window.setTimeout(function () {
      if (window.__arcaDynamicYieldLoaded) {
        return
      }

      window.DY.recommendationContext =
        window.DY.recommendationContext || {
          type: 'OTHER',
          data: ['order_placed'],
        }

      contextReady = true
      maybeLoadDynamicYieldScripts()
    }, fallbackTimeout)

    for (var i = 0; i < hosts.length; i++) {
      addPreconnect(hosts[i])
    }

    loadSettings()
  })()
</script>
